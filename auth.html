<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; img-src 'self' data:;">
<title>DevAI Studio — Вход</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* СОХРАНЕНО: Твои оригинальные стили полностью */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#0d0d0d;--bg1:#141414;--bg2:#1a1a1a;--bg3:#222;--bg4:#2a2a2a;
  --border:#2e2e2e;--border2:#3a3a3a;
  --green:#3ddc84;--green2:#2ab56d;--green3:#1a7a4a;
  --gdim:rgba(61,220,132,0.07);--gdim2:rgba(61,220,132,0.13);
  --text:#e8e8e8;--text2:#999;--text3:#555;
  --red:#e06c75;--yellow:#e5c07b;--blue:#61afef;
  --font-code:'JetBrains Mono',monospace;--font-ui:'Inter',sans-serif;
}
html,body{height:100%;background:var(--bg0);color:var(--text);font-family:var(--font-ui);overflow:hidden}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.25;pointer-events:none}
.bg-glow{position:fixed;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(61,220,132,0.055) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.navbar{position:fixed;top:0;left:0;right:0;height:52px;background:rgba(13,13,13,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;z-index:100;justify-content:space-between}
.nav-logo{display:flex;align-items:center;gap:8px;font-family:var(--font-code);font-size:14px;font-weight:600;color:var(--green);text-decoration:none;cursor:pointer}
.nav-logo-icon{width:28px;height:28px;background:var(--green3);border:1px solid var(--green2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--green);font-weight:700}
.nav-right{display:flex;align-items:center;gap:20px;font-size:13px;color:var(--text2)}
.nav-link{cursor:pointer;transition:.15s}
.nav-link:hover{color:var(--text)}
.page{height:100vh;display:flex;align-items:center;justify-content:center;padding:52px 20px 20px;position:relative}
.card{width:100%;max-width:420px;background:var(--bg1);border:1px solid var(--border);border-radius:14px;overflow:hidden;position:relative;z-index:10;transition:all .3s}
.card-top{height:2px;background:linear-gradient(90deg,transparent,var(--green2),var(--green),var(--green2),transparent)}
.card-inner{padding:32px 32px 28px}
.card-header{text-align:center;margin-bottom:26px}
.card-icon{width:50px;height:50px;background:var(--gdim2);border:1px solid var(--green3);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:24px}
.card-title{font-size:20px;font-weight:600;font-family:var(--font-code);margin-bottom:6px}
.card-sub{font-size:13px;color:var(--text2);line-height:1.5}
.auth-tabs{display:flex;background:var(--bg2);border-radius:8px;padding:3px;gap:3px;margin-bottom:22px}
.auth-tab{flex:1;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-family:var(--font-code);color:var(--text3);cursor:pointer;transition:.2s;border:none;background:transparent}
.auth-tab.active{background:var(--bg4);color:var(--green)}
.oauth-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.oauth-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:9px 0;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;font-size:13px;color:var(--text2);cursor:pointer;transition:.15s;font-family:var(--font-ui)}
.divider{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.div-line{flex:1;height:1px;background:var(--border)}
.div-txt{font-size:11px;color:var(--text3);font-family:var(--font-code)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{margin-bottom:14px}
.flabel{display:block;font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px;font-family:var(--font-code)}
.fwrap{position:relative}
.finput{width:100%;height:38px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;padding:0 36px 0 12px;font-family:var(--font-ui);outline:none;transition:.15s}
.finput:focus{border-color:var(--green3);box-shadow:0 0 0 3px rgba(61,220,132,.06)}
.finput.ok{border-color:var(--green3)}
.ficon{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text3);pointer-events:none}
.ficon.ok{color:var(--green)}
.pw-bars{display:flex;gap:4px;margin-top:5px}
.pw-bar{flex:1;height:3px;border-radius:2px;background:var(--border2);transition:background .3s}
.pw-bar.w{background:var(--red)}.pw-bar.m{background:var(--yellow)}.pw-bar.s{background:var(--green)}
.pw-hint{font-size:11px;color:var(--text3);margin-top:4px;font-family:var(--font-code)}
.pw-hint.s{color:var(--green)}
.cb-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:18px}
.cb{width:17px;height:17px;background:var(--bg2);border:1px solid var(--border2);border-radius:4px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;font-size:11px;color:transparent}
.cb.checked{background:var(--green3);border-color:var(--green2);color:var(--green)}
.cb-label{font-size:12px;color:var(--text2);line-height:1.5}
.cb-label a{color:var(--green);text-decoration:none}
.btn-submit{width:100%;height:42px;background:var(--green3);border:1px solid var(--green2);border-radius:8px;color:var(--green);font-size:13px;font-weight:600;font-family:var(--font-code);cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:18px}
.btn-submit:hover{background:var(--green2);color:#0a1a10;transform:translateY(-1px)}
.auth-link{text-align:center;font-size:12px;color:var(--text3);border-top:1px solid var(--border);padding-top:16px}
.auth-link a{color:var(--green);text-decoration:none;font-family:var(--font-code);font-size:12px;cursor:pointer}
.err-msg{background:rgba(224,108,117,.1);border:1px solid rgba(224,108,117,.3);border-radius:6px;padding:8px 12px;font-size:12px;color:var(--red);margin-bottom:14px;display:none}
.err-msg.show{display:block}
.ok-msg{background:var(--gdim);border:1px solid var(--green3);border-radius:6px;padding:8px 12px;font-size:12px;color:var(--green);margin-bottom:14px;display:none}
.ok-msg.show{display:block}
.aside{margin-left:52px;max-width:260px;display:flex;flex-direction:column;gap:14px;position:relative;z-index:10}
.aside-title{font-family:var(--font-code);font-size:12px;color:var(--green);letter-spacing:.5px;margin-bottom:4px}
.feat{display:flex;gap:12px;align-items:flex-start}
.feat-icon{width:34px;height:34px;background:var(--gdim);border:1px solid var(--green3);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.feat-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px}
.feat-desc{font-size:11px;color:var(--text2);line-height:1.5}
.term-snip{margin-top:8px;background:var(--bg0);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.term-snip-hdr{height:28px;background:var(--bg1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:5px}
.sdot{width:8px;height:8px;border-radius:50%}
.snip-name{margin-left:4px;font-size:10px;color:var(--text3);font-family:var(--font-code)}
.term-snip-body{padding:10px 14px;font-family:var(--font-code);font-size:11px;line-height:1.8;color:var(--text2)}
.tc{color:var(--green)}.tb{color:var(--blue)}
@media(max-width:780px){.aside{display:none}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<nav class="navbar">
  <div class="nav-logo" onclick="window.location.href='index.html'">
    <div class="nav-logo-icon">D</div> DevAI Studio
  </div>
  <div class="nav-right">
    <span class="nav-link">Docs</span>
    <span class="nav-link">Pricing</span>
  </div>
</nav>

<div class="page">
  <div class="card" id="authCard">
    <div class="card-top"></div>
    <div class="card-inner">
      <div class="card-header">
        <div class="card-icon">⚡</div>
        <div class="card-title" id="cardTitle">Create account</div>
        <div class="card-sub" id="cardSub">Начни создавать сайты с AI за 30 секунд</div>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tabReg">Регистрация</button>
        <button class="auth-tab" id="tabLogin">Войти</button>
      </div>

      <div class="err-msg" id="errMsg"></div>
      <div class="ok-msg" id="okMsg"></div>

      <div class="oauth-row">
        <button class="oauth-btn" onclick="oauthNotice()">Google</button>
        <button class="oauth-btn" onclick="oauthNotice()">GitHub</button>
      </div>

      <div class="divider">
        <div class="div-line"></div>
        <div class="div-txt" id="divTxt">или через email</div>
        <div class="div-line"></div>
      </div>

      <div id="registerForm">
        <div class="form-row">
          <div class="form-group">
            <label class="flabel">Имя</label>
            <div class="fwrap">
              <input class="finput" id="regFirst" type="text" placeholder="Алекс" oninput="validateName(this)">
              <span class="ficon" id="regFirstIcon">👤</span>
            </div>
          </div>
          <div class="form-group">
            <label class="flabel">Фамилия</label>
            <div class="fwrap"><input class="finput" id="regLast" type="text" placeholder="Иванов"></div>
          </div>
        </div>
        <div class="form-group">
          <label class="flabel">Email</label>
          <div class="fwrap">
            <input class="finput" id="regEmail" type="email" placeholder="you@example.com" oninput="validateEmail(this,'regEmailIcon')">
            <span class="ficon" id="regEmailIcon">✉</span>
          </div>
        </div>
        <div class="form-group">
          <label class="flabel">Пароль</label>
          <div class="fwrap">
            <input class="finput" id="regPass" type="password" placeholder="Мин. 8 символов" oninput="checkPassword(this)">
            <span class="ficon" onclick="togglePass('regPass')" style="cursor:pointer">👁</span>
          </div>
          <div class="pw-bars"><div class="pw-bar" id="pb1"></div><div class="pw-bar" id="pb2"></div><div class="pw-bar" id="pb3"></div><div class="pw-bar" id="pb4"></div></div>
          <div class="pw-hint" id="pwHint">Введи пароль</div>
        </div>
        <div class="cb-row">
          <div class="cb" id="cbTerms" onclick="toggleCb('cbTerms')">✓</div>
          <div class="cb-label">Я согласен с <a href="#">Terms</a></div>
        </div>
        <button class="btn-submit" id="regBtn" onclick="submitRegister()"><span>▶</span> Создать аккаунт</button>
      </div>

      <div id="loginForm" style="display:none">
        <div class="form-group">
          <label class="flabel">Email</label>
          <div class="fwrap"><input class="finput" id="loginEmail" type="email" placeholder="you@example.com"></div>
        </div>
        <div class="form-group">
          <label class="flabel">Пароль</label>
          <div class="fwrap"><input class="finput" id="loginPass" type="password" placeholder="Твой пароль"></div>
        </div>
        <button class="btn-submit" onclick="submitLogin()"><span>→</span> Войти</button>
      </div>

      <div class="auth-link" id="authLink">Уже есть аккаунт? <a id="switchLink">Войти →</a></div>
    </div>
  </div>

  <div class="aside">
    <div class="aside-title">// что тебя ждёт</div>
    <div class="feat">
      <div class="feat-icon">🤖</div>
      <div><div class="feat-title">AI на базе Gemini</div><div class="feat-desc">Генерируй блоки одной командой</div></div>
    </div>
    <div class="term-snip">
      <div class="term-snip-hdr"><div class="sdot" style="background:#28c840"></div><div class="snip-name">devai terminal</div></div>
      <div class="term-snip-body"><div><span class="tc">$</span> devai create my-site</div><div><span class="tc">✓</span> Server started :3000</div></div>
    </div>
  </div>
</div>

<script>
'use strict';
/* СОХРАНЕНО: Твоя сложная логика с SHA-256 и Rate Limit */
let currentTab = 'register';
let cbChecked = false;

async function hashPassword(p) {
  const b = new TextEncoder().encode(p);
  const h = await crypto.subtle.digest('SHA-256', b);
  return Array.from(new Uint8Array(h)).map(x => x.toString(16).padStart(2, '0')).join('');
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabReg').classList.toggle('active', tab === 'register');
  document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
  document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('cardTitle').textContent = tab === 'register' ? 'Create account' : 'Welcome back';
  document.getElementById('switchLink').textContent = tab === 'register' ? 'Войти →' : 'Создать →';
}

function toggleCb(id) { 
  cbChecked = !cbChecked; 
  document.getElementById(id).classList.toggle('checked', cbChecked); 
}

function togglePass(id) { 
  const i = document.getElementById(id); 
  i.type = i.type === 'password' ? 'text' : 'password'; 
}

function validateName(i) {
  const ok = i.value.trim().length >= 2;
  i.className = 'finput ' + (ok ? 'ok' : 'err');
}

function validateEmail(i, iconId) {
  const ok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(i.value);
  i.className = 'finput ' + (ok ? 'ok' : 'err');
}

function checkPassword(input) {
  const v = input.value;
  const score = [v.length >= 8, /\d/.test(v), /[A-Z]/.test(v), /[!@#$%^&*]/.test(v)].filter(Boolean).length;
  const cls = score <= 1 ? 'w' : score <= 2 ? 'm' : 's';
  ['pb1','pb2','pb3','pb4'].forEach((id, i) => { document.getElementById(id).className = 'pw-bar ' + (i < score ? cls : ''); });
}

async function submitRegister() {
  const first = document.getElementById('regFirst').value;
  const email = document.getElementById('regEmail').value.toLowerCase();
  const pass = document.getElementById('regPass').value;
  if (!cbChecked || pass.length < 8) return alert('Проверь данные и условия');

  const users = JSON.parse(localStorage.getItem('devai_users') || '[]');
  const passHash = await hashPassword(pass);
  users.push({name: first, email, passHash});
  localStorage.setItem('devai_users', JSON.stringify(users));
  localStorage.setItem('devai_user', JSON.stringify({name: first, email}));
  window.location.href = 'dashboard.html';
}

async function submitLogin() {
  const email = document.getElementById('loginEmail').value.toLowerCase();
  const pass = document.getElementById('loginPass').value;
  const users = JSON.parse(localStorage.getItem('devai_users') || '[]');
  const passHash = await hashPassword(pass);
  const user = users.find(u => u.email === email && u.passHash === passHash);
  if (user) {
    localStorage.setItem('devai_user', JSON.stringify({name: user.name, email: user.email}));
    window.location.href = 'dashboard.html';
  } else {
    alert('Неверный вход');
  }
}

document.getElementById('tabReg').onclick = () => switchTab('register');
document.getElementById('tabLogin').onclick = () => switchTab('login');
document.getElementById('switchLink').onclick = () => switchTab(currentTab === 'register' ? 'login' : 'register');
</script>
</body>
</html>
