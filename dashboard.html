<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; img-src 'self' data:;">
<title>DevAI Studio — Дашборд</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ... (Твои стили без изменений) ... */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#0a0a0a;--bg1:#111;--bg2:#171717;--bg3:#1e1e1e;--bg4:#252525;
  --border:#242424;--border2:#313131;
  --green:#3ddc84;--green2:#2ab56d;--green3:#1a7a4a;
  --gdim:rgba(61,220,132,0.07);--gdim2:rgba(61,220,132,0.13);
  --text:#f0f0f0;--text2:#aaa;--text3:#555;
  --red:#e06c75;--yellow:#e5c07b;--blue:#61afef;
  --font-code:'JetBrains Mono',monospace;--font-ui:'Inter',sans-serif;
}
html,body{height:100%;background:var(--bg0);color:var(--text);font-family:var(--font-ui)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg0)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

.topbar{height:56px;background:var(--bg1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:20px;position:sticky;top:0;z-index:100}
.tb-logo{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0}
.tb-logo-icon{width:26px;height:26px;background:var(--green3);border:1px solid var(--green2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--font-code);font-size:12px;font-weight:700;color:var(--green)}
.tb-logo-text{font-family:var(--font-code);font-size:13px;font-weight:600;color:var(--green)}
.tb-sep{width:1px;height:22px;background:var(--border2);flex-shrink:0}
.tb-nav{display:flex;gap:2px}
.tb-nav-item{padding:5px 12px;border-radius:6px;font-size:13px;color:var(--text3);cursor:pointer;transition:.15s;text-decoration:none;display:flex;align-items:center;gap:6px}
.tb-nav-item:hover{color:var(--text2);background:var(--bg3)}
.tb-nav-item.active{color:var(--text);background:var(--bg3)}
.tb-spacer{flex:1}
.tb-search{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border2);border-radius:7px;padding:0 12px;height:34px;width:240px}
.tb-search input{background:none;border:none;outline:none;color:var(--text);font-size:13px;font-family:var(--font-ui);width:100%}
.tb-search input::placeholder{color:var(--text3)}
.tb-search-icon{color:var(--text3);font-size:13px;flex-shrink:0}
.tb-user{display:flex;align-items:center;gap:10px;cursor:pointer;padding:4px 8px;border-radius:7px;transition:.15s}
.tb-user:hover{background:var(--bg3)}
.tb-avatar{width:30px;height:30px;border-radius:50%;background:var(--green3);border:1px solid var(--green2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--green);font-family:var(--font-code)}
.tb-username{font-size:13px;color:var(--text2)}
.tb-btn{height:34px;padding:0 14px;background:var(--green3);border:1px solid var(--green2);border-radius:7px;color:var(--green);font-size:12px;font-weight:600;font-family:var(--font-code);cursor:pointer;transition:.2s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.tb-btn:hover{background:var(--green2);color:#0a1a10}

.layout{display:flex;height:calc(100vh - 56px)}
.dash-sidebar{width:220px;background:var(--bg1);border-right:1px solid var(--border);padding:16px 0;flex-shrink:0}
.ds-section{padding:0 12px;margin-bottom:20px}
.ds-title{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:1px;text-transform:uppercase;font-family:var(--font-code);padding:0 8px;margin-bottom:6px}
.ds-item{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:6px;font-size:13px;color:var(--text2);cursor:pointer;transition:.15s;text-decoration:none}
.ds-item:hover{background:var(--bg3);color:var(--text)}
.ds-item.active{background:var(--bg3);color:var(--text)}
.ds-item.active .ds-icon{color:var(--green)}
.ds-icon{font-size:14px;flex-shrink:0}
.ds-badge{margin-left:auto;font-size:10px;background:var(--bg4);color:var(--text3);padding:1px 6px;border-radius:8px;font-family:var(--font-code)}
.ds-badge.green{background:var(--gdim);color:var(--green);border:1px solid var(--green3)}
.ds-divider{height:1px;background:var(--border);margin:8px 12px}

.dash-main{flex:1;overflow-y:auto;padding:28px 32px}
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.dash-title{font-size:20px;font-weight:600}
.dash-subtitle{font-size:13px;color:var(--text3);margin-top:2px}
.dash-actions{display:flex;gap:10px}
.btn-new{height:36px;padding:0 16px;background:var(--green3);border:1px solid var(--green2);border-radius:7px;color:var(--green);font-size:13px;font-weight:600;font-family:var(--font-code);cursor:pointer;transition:.2s;display:flex;align-items:center;gap:6px}
.btn-new:hover{background:var(--green2);color:#0a1a10}
.btn-import{height:36px;padding:0 16px;background:var(--bg2);border:1px solid var(--border2);border-radius:7px;color:var(--text2);font-size:13px;cursor:pointer;transition:.2s;font-family:var(--font-ui)}
.btn-import:hover{border-color:var(--border2);color:var(--text);background:var(--bg3)}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.stat-card{background:var(--bg1);border:1px solid var(--border);border-radius:10px;padding:16px 18px}
.sc-value{font-size:24px;font-weight:700;font-family:var(--font-code);color:var(--text);margin-bottom:2px}
.sc-label{font-size:12px;color:var(--text3)}
.sc-change{font-size:11px;margin-top:6px;font-family:var(--font-code)}
.sc-change.up{color:var(--green)}
.sc-change.neutral{color:var(--text3)}

.filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.filter-tabs{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:3px}
.filter-tab{padding:5px 14px;border-radius:5px;font-size:12px;color:var(--text3);cursor:pointer;transition:.15s;font-family:var(--font-code);background:none;border:none}
.filter-tab.active{background:var(--bg4);color:var(--text)}
.filter-tab:hover:not(.active){color:var(--text2)}
.filter-sort{height:32px;padding:0 12px;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;color:var(--text2);font-size:12px;font-family:var(--font-ui);outline:none;cursor:pointer}
.filter-sort option{background:var(--bg2);color:var(--text)}
.view-toggle-dash{display:flex;gap:2px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:2px}
.vt-btn{width:28px;height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);transition:.15s;font-size:13px;background:none;border:none}
.vt-btn.active{background:var(--bg4);color:var(--text)}
.vt-btn:hover:not(.active){color:var(--text2)}

.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.project-card{background:var(--bg1);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:.2s;position:relative}
.project-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.project-card:hover .pc-actions{opacity:1}
.pc-preview{height:110px;background:var(--bg3);border-bottom:1px solid var(--border);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.pc-preview-code{font-family:var(--font-code);font-size:9px;color:var(--text3);line-height:1.4;padding:10px;pointer-events:none;opacity:.6;width:100%}
.pc-actions{position:absolute;top:8px;right:8px;display:flex;gap:6px;opacity:0;transition:.2s;z-index:2}
.pc-action-btn{width:28px;height:28px;background:rgba(10,10,10,.85);border:1px solid var(--border2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;transition:.15s;color:var(--text2)}
.pc-action-btn:hover{background:var(--bg3);border-color:var(--border2);color:var(--text)}
.pc-action-btn.danger:hover{border-color:rgba(224,108,117,.5);color:var(--red)}
.pc-body{padding:14px 16px}
.pc-name{font-size:14px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc-meta{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:10px;font-family:var(--font-code)}
.pc-dot{width:4px;height:4px;border-radius:50%;background:var(--text3)}
.pc-files{display:flex;gap:4px;margin-top:10px;flex-wrap:wrap}
.pc-file-tag{font-size:9px;font-family:var(--font-code);padding:1px 5px;border-radius:4px;border:1px solid var(--border2);color:var(--text3)}
.pc-file-tag.html{border-color:rgba(224,108,117,.3);color:#e06c75}
.pc-file-tag.css{border-color:rgba(97,175,239,.3);color:#61afef}
.pc-file-tag.js{border-color:rgba(229,192,123,.3);color:#e5c07b}
.pc-status{position:absolute;top:8px;left:8px;font-size:10px;font-family:var(--font-code);padding:2px 7px;border-radius:8px;z-index:2;background:var(--gdim);border:1px solid var(--green3);color:var(--green)}

.empty-state{text-align:center;padding:80px 20px;color:var(--text3);grid-column:1/-1}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.5}
.empty-title{font-size:16px;font-weight:500;margin-bottom:8px;color:var(--text2)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg1);border:1px solid var(--border);border-radius:14px;padding:30px;width:460px;max-width:90vw;position:relative}
.modal-top{height:2px;background:linear-gradient(90deg,transparent,var(--green2),var(--green),var(--green2),transparent);margin:-30px -30px 24px;border-radius:14px 14px 0 0}
.modal-title{font-size:16px;font-weight:600;font-family:var(--font-code);margin-bottom:6px}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:22px}
.modal-label{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;font-family:var(--font-code);margin-bottom:6px;display:block}
.modal-input,.modal-select{width:100%;height:40px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;padding:0 12px;font-family:var(--font-ui);outline:none;transition:.15s;margin-bottom:14px}
.modal-input:focus{border-color:var(--green3);box-shadow:0 0 0 3px rgba(61,220,132,.07)}
.modal-btn{width:100%;height:40px;background:var(--green3);border:1px solid var(--green2);border-radius:7px;color:var(--green);font-size:13px;font-weight:600;font-family:var(--font-code);cursor:pointer;transition:.2s}
.modal-btn:hover{background:var(--green2);color:#0a1a10}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;line-height:1}

.notif{position:fixed;bottom:24px;right:24px;background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:12px 16px;font-size:13px;z-index:9999;display:flex;align-items:center;gap:10px;transform:translateY(20px);opacity:0;transition:.3s}
.notif.show{transform:translateY(0);opacity:1}
.notif-dot{width:8px;height:8px;border-radius:50%}
.notif.success .notif-dot{background:var(--green)}
.notif.error .notif-dot{background:var(--red)}
.notif.info .notif-dot{background:var(--blue)}
</style>
</head>
<body>

<div class="modal-overlay" id="newProjectModal">
  <div class="modal">
    <div class="modal-top"></div>
    <button class="modal-close" id="closeModal">×</button>
    <div class="modal-title">Новый проект</div>
    <div class="modal-sub">Создай новый веб-проект</div>
    <label class="modal-label">Название проекта</label>
    <input class="modal-input" id="projectName" placeholder="my-awesome-site" maxlength="50">
    <label class="modal-label">Шаблон</label>
    <select class="modal-select" id="projectTemplate">
      <option value="blank">Пустой проект</option>
      <option value="landing">Лендинг (HTML + CSS + JS)</option>
      <option value="portfolio">Портфолио</option>
      <option value="blog">Блог</option>
    </select>
    <label class="modal-label">Иконка</label>
    <div style="display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap" id="iconPicker">
      <div class="icon-opt" data-icon="🚀" onclick="selectIcon(this)" style="width:36px;height:36px;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:.15s">🚀</div>
      <div class="icon-opt" data-icon="🌐" onclick="selectIcon(this)" style="width:36px;height:36px;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:.15s">🌐</div>
      <div class="icon-opt" data-icon="🎨" onclick="selectIcon(this)" style="width:36px;height:36px;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:.15s">🎨</div>
      <div class="icon-opt" data-icon="⚡" onclick="selectIcon(this)" style="width:36px;height:36px;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:.15s">⚡</div>
    </div>
    <button class="modal-btn" onclick="createProject()">▶ Создать проект</button>
  </div>
</div>

<div class="notif" id="notif"></div>

<div class="topbar">
  <a class="tb-logo" href="index.html">
    <div class="tb-logo-icon">D</div>
    <div class="tb-logo-text">DevAI Studio</div>
  </a>
  <div class="tb-sep"></div>
  <div class="tb-nav">
    <a class="tb-nav-item active" href="dashboard.html">Проекты</a>
    <a class="tb-nav-item" href="editor.html">Редактор</a>
  </div>
  <div class="tb-spacer"></div>
  <div class="tb-search">
    <span class="tb-search-icon">🔍</span>
    <input id="searchInput" type="text" placeholder="Поиск..." oninput="renderProjects()">
  </div>
  <div class="tb-user" id="tbUser">
    <div class="tb-avatar" id="tbAvatar">?</div>
    <div class="tb-username" id="tbUsername">Загрузка...</div>
  </div>
  <button class="tb-btn" onclick="openNewProjectModal()">+ Новый проект</button>
</div>

<div class="layout">
  <div class="dash-sidebar">
    <div class="ds-section">
      <div class="ds-title">Навигация</div>
      <a class="ds-item active" href="#">
        <span class="ds-icon">📁</span> Все проекты
        <span class="ds-badge green" id="projectCountBadge">0</span>
      </a>
    </div>
    <div class="ds-divider"></div>
    <div class="ds-section">
      <div class="ds-title">Аккаунт</div>
      <div class="ds-item" onclick="logout()" style="color:var(--red)">
        <span class="ds-icon">🚪</span> Выйти
      </div>
    </div>
  </div>

  <div class="dash-main">
    <div class="dash-header">
      <div>
        <div class="dash-title">Мои проекты</div>
        <div class="dash-subtitle" id="dashSubtitle">Привет!</div>
      </div>
      <div class="dash-actions">
        <button class="btn-new" onclick="openNewProjectModal()">+ Новый проект</button>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="sc-value" id="statTotal">0</div>
        <div class="sc-label">Проектов</div>
      </div>
      <div class="stat-card">
        <div class="sc-value" id="statFiles">0</div>
        <div class="sc-label">Файлов</div>
      </div>
      <div class="stat-card">
        <div class="sc-value" id="statAI">●</div>
        <div class="sc-label">Gemini API</div>
      </div>
    </div>

    <div class="filter-bar">
      <div class="filter-tabs">
        <button class="filter-tab active">Все</button>
      </div>
      <div style="flex:1"></div>
    </div>

    <div id="projectsContainer" class="projects-grid"></div>
  </div>
</div>

<script>
'use strict';

let projects = [];
let selectedIcon = '🚀';

const TEMPLATES = {
  blank: { 'index.html': '<html><body><h1>New Project</h1></body></html>' },
  landing: { 'index.html': '<html><body><h1>Landing Page</h1></body></html>', 'style.css': 'body{background:#000;color:#fff}' },
  portfolio: { 'index.html': '<html><body><h1>My Portfolio</h1></body></html>' },
  blog: { 'index.html': '<html><body><h1>My Blog</h1></body></html>' }
};

// ==================== CORE FUNCTIONS ====================

function notify(msg, type = 'success') {
  const el = document.getElementById('notif');
  el.className = `notif ${type} show`;
  el.innerHTML = `<div class="notif-dot"></div><span>${msg}</span>`;
  setTimeout(() => el.classList.remove('show'), 3000);
}

function initAuth() {
  const raw = localStorage.getItem('devai_user');
  if (!raw) { window.location.href = 'auth.html'; return; }
  const u = JSON.parse(raw);
  document.getElementById('tbUsername').textContent = u.name;
  document.getElementById('tbAvatar').textContent = u.name[0].toUpperCase();
  
  const hr = new Date().getHours();
  const greet = hr < 12 ? 'Доброе утро' : hr < 18 ? 'Добрый день' : 'Добрый вечер';
  document.getElementById('dashSubtitle').textContent = `${greet}, ${u.name}!`;
}

function loadProjects() {
  projects = JSON.parse(localStorage.getItem('devai_projects') || '[]');
  updateStats();
  renderProjects();
}

function updateStats() {
  document.getElementById('statTotal').textContent = projects.length;
  document.getElementById('projectCountBadge').textContent = projects.length;
  
  let totalFiles = 0;
  projects.forEach(p => totalFiles += Object.keys(p.files).length);
  document.getElementById('statFiles').textContent = totalFiles;

  const hasKey = !!localStorage.getItem('gemini_api_key');
  const aiEl = document.getElementById('statAI');
  aiEl.textContent = hasKey ? 'Активен' : 'Не задан';
  aiEl.style.color = hasKey ? 'var(--green)' : 'var(--text3)';
}

function renderProjects() {
  const container = document.getElementById('projectsContainer');
  const search = document.getElementById('searchInput').value.toLowerCase();
  container.innerHTML = '';

  const filtered = projects.filter(p => p.name.toLowerCase().includes(search));

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📂</div>
        <div class="empty-title">Проектов пока нет</div>
        <button class="tb-btn" style="margin:auto" onclick="openNewProjectModal()">Создать первый</button>
      </div>`;
    return;
  }

  filtered.forEach(p => {
    const card = document.createElement('div');
    card.className = 'project-card';
    card.onclick = () => openProject(p.id);
    
    const preview = p.files['index.html'] ? p.files['index.html'].substring(0, 150).replace(/</g, '&lt;') : 'No content';

    card.innerHTML = `
      <div class="pc-status">${p.icon}</div>
      <div class="pc-preview">
        <div class="pc-preview-code">${preview}...</div>
      </div>
      <div class="pc-actions">
        <button class="pc-action-btn danger" onclick="deleteProject('${p.id}', event)">✕</button>
      </div>
      <div class="pc-body">
        <div class="pc-name">${p.name}</div>
        <div class="pc-meta">
          <span>${Object.keys(p.files).length} файлов</span>
          <div class="pc-dot"></div>
          <span>${new Date(p.updatedAt).toLocaleDateString()}</span>
        </div>
      </div>
    `;
    container.appendChild(card);
  });
}

// ==================== ACTIONS ====================

function openNewProjectModal() {
  document.getElementById('newProjectModal').classList.add('open');
}

function closeNewProjectModal() {
  document.getElementById('newProjectModal').classList.remove('open');
}

function selectIcon(el) {
  document.querySelectorAll('.icon-opt').forEach(opt => opt.style.borderColor = 'var(--border2)');
  el.style.borderColor = 'var(--green)';
  selectedIcon = el.dataset.icon;
}

function createProject() {
  const nameInput = document.getElementById('projectName');
  const name = nameInput.value.trim();
  const templateKey = document.getElementById('projectTemplate').value;

  if (!name) { notify('Введите название!', 'error'); return; }

  const newProj = {
    id: Date.now().toString(36),
    name: name,
    icon: selectedIcon,
    files: { ...TEMPLATES[templateKey] },
    updatedAt: Date.now()
  };

  projects.unshift(newProj);
  localStorage.setItem('devai_projects', JSON.stringify(projects));
  
  notify(`Проект "${name}" создан`);
  closeNewProjectModal();
  nameInput.value = '';
  loadProjects();
}

function deleteProject(id, e) {
  e.stopPropagation();
  if (!confirm('Удалить проект?')) return;
  projects = projects.filter(p => p.id !== id);
  localStorage.setItem('devai_projects', JSON.stringify(projects));
  loadProjects();
  notify('Проект удален', 'info');
}

function openProject(id) {
  const p = projects.find(proj => proj.id === id);
  localStorage.setItem('devai_active_project', JSON.stringify(p));
  window.location.href = 'editor.html';
}

function logout() {
  if (confirm('Выйти?')) {
    localStorage.removeItem('devai_user');
    window.location.href = 'auth.html';
  }
}

// ==================== INIT ====================

document.getElementById('closeModal').onclick = closeNewProjectModal;
window.onclick = (e) => { if(e.target.id === 'newProjectModal') closeNewProjectModal(); };

document.addEventListener('DOMContentLoaded', () => {
  initAuth();
  loadProjects();
});

</script>
